version: 2.1
orbs:
  lucos: lucos/deploy@0

jobs:
  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install requests pytest
      - run:
          name: Run tests
          command: pytest

workflows:
  version: 2
  test-publish:
    jobs:
      - test
      - lucos/release-pip:
          requires:
            - test
          filters:
            branches:
              only: main
